<h2>整体布局结构</h2>
<p class="subtitle">选择页面的基本骨架</p>

<div class="cards">

  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#fff;padding:12px;font-family:system-ui;min-height:140px">
        <!-- Top nav -->
        <div style="border-bottom:1px solid #f3f4f6;padding-bottom:10px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:12px;font-weight:700;color:#111">Portfolio Lab</span>
          <div style="display:flex;gap:12px">
            <span style="font-size:11px;color:#6b7280">提交任务</span>
            <span style="font-size:11px;font-weight:600;color:#111;border-bottom:2px solid #111;padding-bottom:2px">任务列表</span>
          </div>
        </div>
        <!-- Page content -->
        <div style="max-width:600px;margin:0 auto">
          <div style="font-size:13px;font-weight:700;color:#111;margin-bottom:8px">任务列表</div>
          <div style="border:1px solid #f3f4f6;border-radius:8px;overflow:hidden">
            <div style="padding:8px 12px;border-bottom:1px solid #f3f4f6;display:flex;gap:8px">
              <div style="width:40%;font-size:10px;color:#9ca3af">任务 ID</div>
              <div style="width:25%;font-size:10px;color:#9ca3af">状态</div>
              <div style="width:25%;font-size:10px;color:#9ca3af">创建时间</div>
            </div>
            <div style="padding:8px 12px;border-bottom:1px solid #f3f4f6;display:flex;gap:8px">
              <div style="width:40%;font-size:10px;color:#3b82f6">job-abc123</div>
              <div style="width:25%"><span style="font-size:9px;background:#f0fdf4;color:#16a34a;padding:2px 6px;border-radius:99px">完成</span></div>
              <div style="width:25%;font-size:10px;color:#6b7280">01-09</div>
            </div>
            <div style="padding:8px 12px;display:flex;gap:8px">
              <div style="width:40%;font-size:10px;color:#3b82f6">job-def456</div>
              <div style="width:25%"><span style="font-size:9px;background:#fef3c7;color:#d97706;padding:2px 6px;border-radius:99px">运行中</span></div>
              <div style="width:25%;font-size:10px;color:#6b7280">01-09</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A · 顶部导航栏</h3>
      <p>全宽顶部 nav，内容居中显示。简洁，跟现在布局接近，改动最小。</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#fafafa;padding:0;font-family:system-ui;display:flex;min-height:140px">
        <!-- Sidebar -->
        <div style="width:80px;background:#fff;border-right:1px solid #f3f4f6;padding:12px 8px;flex-shrink:0">
          <div style="width:24px;height:24px;background:#111;border-radius:6px;margin:0 auto 16px"></div>
          <div style="font-size:9px;color:#9ca3af;text-align:center;margin-bottom:8px;padding:4px">提交</div>
          <div style="background:#f3f4f6;border-radius:6px;font-size:9px;color:#111;text-align:center;padding:4px;margin-bottom:8px;font-weight:600">任务</div>
          <div style="font-size:9px;color:#9ca3af;text-align:center;padding:4px">结果</div>
        </div>
        <!-- Content -->
        <div style="flex:1;padding:12px">
          <div style="font-size:12px;font-weight:700;color:#111;margin-bottom:8px">任务列表</div>
          <div style="display:flex;gap:6px;margin-bottom:8px">
            <input style="flex:1;border:1px solid #e5e7eb;border-radius:6px;padding:4px 8px;font-size:10px;color:#6b7280" placeholder="搜索..." readonly />
            <div style="background:#111;border-radius:6px;padding:4px 10px;font-size:10px;color:#fff">筛选</div>
          </div>
          <div style="background:#fff;border:1px solid #f3f4f6;border-radius:8px;padding:8px;font-size:10px;color:#6b7280">
            <div style="color:#111;font-weight:600;margin-bottom:4px">job-abc123</div>
            <div>完成 · 2026-01-09</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B · 左侧固定侧边栏</h3>
      <p>窄侧边栏做页面导航，内容区占主空间。多页面切换更流畅，有 app 感。</p>
    </div>
  </div>

</div>
